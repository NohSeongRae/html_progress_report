<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Progress Reports</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #101828;
        --text: #344054;
        --muted: #667085;
        --line: #d9e2ec;
        --teal: #14b8a6;
        --orange: #f97316;
        --blue: #2563eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(120deg, rgba(20, 184, 166, 0.12), transparent 38%),
          linear-gradient(240deg, rgba(249, 115, 22, 0.12), transparent 36%),
          #f4f7fb;
        color: var(--ink);
        font-family: Inter, "Segoe UI", "Malgun Gothic", Arial, sans-serif;
      }

      main {
        width: min(1040px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 72px 0;
      }

      header {
        margin-bottom: 34px;
      }

      .kicker {
        color: var(--teal);
        font-size: 15px;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1 {
        margin: 14px 0 0;
        color: var(--ink);
        font-size: clamp(44px, 7vw, 78px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        max-width: 720px;
        margin: 22px 0 0;
        color: var(--text);
        font-size: 22px;
        font-weight: 700;
        line-height: 1.42;
      }

      .report-list {
        display: grid;
        gap: 16px;
        margin-top: 38px;
      }

      .report-card {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 24px;
        padding: 26px 28px;
        border: 1px solid rgba(148, 163, 184, 0.34);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 46px rgba(15, 23, 42, 0.10);
        color: inherit;
        text-decoration: none;
      }

      .report-card b {
        display: block;
        font-size: 28px;
        line-height: 1.1;
      }

      .report-card span {
        display: block;
        margin-top: 10px;
        color: var(--muted);
        font-size: 17px;
        font-weight: 800;
      }

      .arrow {
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--teal), var(--blue));
        color: #ffffff;
        font-size: 26px;
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="kicker">Lab Meeting Progress Reports</div>
        <h1>Progress Report Archive</h1>
        <p>매주 누적되는 progress report를 선택해서 발표용 HTML slide deck으로 이동합니다.</p>
      </header>

      <section class="report-list" aria-label="Progress report list">
        <a class="report-card" href="./2026-05-24/">
          <div>
            <b>2026-05-24 Lab Meeting</b>
            <span>BMVC 2026 · ICLR 2027 project progress</span>
          </div>
          <div class="arrow" aria-hidden="true">›</div>
        </a>
      </section>
    </main>
  </body>
</html>
